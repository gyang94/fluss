meta:
  name: perf-kv-agg
  description: "KV table mixed write/lookup – SUM/MAX/MIN aggregation contention"
  tags: [kv, aggregation, mixed, perf]

table:
  name: mixed_agg
  columns:
    - name: user_id
      type: BIGINT
    - name: total_amount
      type: DOUBLE
      agg: SUM
    - name: max_score
      type: INT
      agg: MAX
    - name: min_score
      type: INT
      agg: MIN
    - name: is_active
      type: BOOLEAN
      agg: BOOL_OR
  primary-key: [user_id]
  merge-engine: AGGREGATION
  buckets: 12

data:
  seed: 42
  generators:
    user_id:
      type: sequential
      start: 0
      end: 1000000
    total_amount:
      type: random-double
      min: 0.01
      max: 9999.99
    max_score:
      type: random-int
      min: 0
      max: 100
    min_score:
      type: random-int
      min: 0
      max: 100
    is_active:
      type: random-boolean
      true-ratio: 0.7

workload:
  # Phase 1: bulk load (scaled down for local testing)
  - phase: write
    warmup: "5000"
    records: 1000000
    threads: 4
  # Phase 2: sustained mixed – write-heavy
  - phase: mixed
    duration: 1m
    threads: 4
    mix:
      write: 70
      lookup: 30
  # Phase 3: read-heavy burst
  - phase: mixed
    duration: 1m
    threads: 4
    mix:
      write: 20
      lookup: 80

report:
  formats: [json, csv, html]

thresholds:
  write-tps:
    min: 30000
  p99-ms:
    max: 5000
