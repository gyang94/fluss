meta:
  name: perf-log-append
  description: "Log table append throughput – sustained write + concurrent scan stress"
  tags: [log, throughput, sustained, perf]

table:
  name: event_log
  columns:
    - name: event_id
      type: BIGINT
    - name: event_time
      type: BIGINT
    - name: payload
      type: STRING
  buckets: 12
  log-format: INDEXED

data:
  seed: 42
  generators:
    event_id:
      type: sequential
      start: 0
      end: 2000000
    event_time:
      type: timestamp-now
    payload:
      type: random-string
      length: 512

workload:
  # Phase 1: sustained write – 2M records, 512B payload (scaled down for local testing)
  - phase: write
    warmup: "10000"
    records: 2000000
    threads: 4
  # Phase 2: concurrent scan on written data
  - phase: scan
    duration: 1m
    threads: 4
    from-offset: earliest

report:
  formats: [json, csv, html]

thresholds:
  write-tps:
    min: 50000
  p99-ms:
    max: 2000
