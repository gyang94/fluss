global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'fluss-coordinator'
    static_configs:
      - targets: ['coordinator-server:9249']
        labels:
          service: coordinator-server

  - job_name: 'fluss-tablet-servers'
    static_configs:
      - targets:
          - 'tablet-server-0:9249'
          - 'tablet-server-1:9249'
          - 'tablet-server-2:9249'
        labels:
          service: tablet-server
