# Local Fluss cluster for development and testing.
#
# Prerequisites:
#   1. Build the local Docker image first:  ./build-local-image.sh
#   2. Launch:                              docker compose up -d
#   3. Tear down:                           docker compose down -v
#
# Ports exposed to localhost:
#   - 2181  : ZooKeeper
#   - 9123  : CoordinatorServer (CLIENT listener)
#   - 9124  : TabletServer      (CLIENT listener)

services:
  zookeeper:
    image: zookeeper:3.9.2
    restart: always
    ports:
      - "2181:2181"

  coordinator-server:
    image: fluss-local:latest
    command: coordinatorServer
    depends_on:
      - zookeeper
    environment:
      - |
        FLUSS_PROPERTIES=
        zookeeper.address: zookeeper:2181
        bind.listeners: INTERNAL://coordinator-server:0, CLIENT://coordinator-server:9123
        advertised.listeners: CLIENT://localhost:9123
        internal.listener.name: INTERNAL
        remote.data.dir: /tmp/fluss/remote-data
    ports:
      - "9123:9123"

  tablet-server:
    image: fluss-local:latest
    command: tabletServer
    depends_on:
      - coordinator-server
    environment:
      - |
        FLUSS_PROPERTIES=
        zookeeper.address: zookeeper:2181
        bind.listeners: INTERNAL://tablet-server:0, CLIENT://tablet-server:9123
        advertised.listeners: CLIENT://localhost:9124
        internal.listener.name: INTERNAL
        tablet-server.id: 0
        kv.snapshot.interval: 0s
        data.dir: /tmp/fluss/data
        remote.data.dir: /tmp/fluss/remote-data
    ports:
      - "9124:9123"
    volumes:
      - shared-tmpfs:/tmp/fluss

volumes:
  shared-tmpfs:
    driver: local
    driver_opts:
      type: "tmpfs"
      device: "tmpfs"
