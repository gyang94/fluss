name: Python Build and Tests

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'website/**'
      - '**/*.md'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'website/**'
      - '**/*.md'
      - 'bindings/cpp/**'
      - 'bindings/elixir/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  build-and-test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12"]
    env:
      FLUSS_TEST_CLUSTER_BIN: ${{ github.workspace }}/target/debug/fluss-test-cluster
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39

      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build fluss-test-cluster binary
        run: cargo build -p fluss-test-cluster

      - name: Build Python bindings
        working-directory: bindings/python
        run: |
          uv sync --extra dev --no-install-project
          uv run --no-sync maturin develop --uv

      - name: Run tests (parallel)
        working-directory: bindings/python
        run: uv run --no-sync pytest test/ -v -n 2 --dist=loadfile
        env:
          RUST_LOG: DEBUG
          RUST_BACKTRACE: full
          FLUSS_SKIP_CLUSTER_TEARDOWN: "1"

      - name: Dump fluss cluster container logs
        if: always()
        run: |
          mkdir -p cluster-logs
          for c in $(docker ps -a --filter "name=shared-test" --format '{{.Names}}'); do
            docker logs "$c" > "cluster-logs/$c.log" 2>&1 || true
          done

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cluster-logs-${{ matrix.python }}
          path: cluster-logs/
          if-no-files-found: ignore
          retention-days: 3

  stubtest:
    # For stub tests, we only needs the module importable, so no
    # test cluster is started and a single Python version should be sufficient.
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39

      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build Python bindings
        working-directory: bindings/python
        run: |
          uv sync --extra dev --no-install-project
          uv run --no-sync maturin develop --uv

      - name: Check stub drift (stubtest)
        working-directory: bindings/python
        run: |
          uv run --no-sync python -m mypy.stubtest fluss \
            --mypy-config-file pyproject.toml \
            --allowlist stubtest-allowlist.txt
